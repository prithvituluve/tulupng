<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Text to PNG Generator</title>

<style>
@font-face {
    font-family: 'MyCustomFont';
    src: url('fonts/myfont.ttf') format('truetype');
}

body {
    font-family: Arial, sans-serif;
    background: #f5f5f5;
    text-align: center;
    padding: 30px;
}

.container {
    background: white;
    padding: 20px;
    border-radius: 10px;
    max-width: 500px;
    margin: auto;
}

#preview {
    margin-top: 20px;
    padding: 20px;
    border: 2px dashed #ccc;
    font-family: 'MyCustomFont', sans-serif;
}
</style>
</head>

<body>

<div class="container">
    <h2>Text to PNG Generator</h2>

    <input type="text" id="textInput" placeholder="Enter text">

    <div id="preview">Preview Text</div>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

const textInput = document.getElementById("textInput");
const preview = document.getElementById("preview");
const textColor = document.getElementById("textColor");
const bgColor = document.getElementById("bgColor");
const transparentBg = document.getElementById("transparentBg");
const fontSize = document.getElementById("fontSize");
const sizeValue = document.getElementById("sizeValue");

let customFontName = "MyCustomFont";

function updatePreview() {
    preview.textContent = textInput.value || "Preview Text";
    preview.style.color = textColor.value;
    preview.style.fontSize = fontSize.value + "px";
    preview.style.fontFamily = customFontName;

    sizeValue.textContent = fontSize.value;

    if (transparentBg.checked) {
        preview.style.background = "transparent";
    } else {
        preview.style.background = bgColor.value;
    }
}

textInput.addEventListener("input", updatePreview);
textColor.addEventListener("input", updatePreview);
bgColor.addEventListener("input", updatePreview);
transparentBg.addEventListener("change", updatePreview);
fontSize.addEventListener("input", updatePreview);

updatePreview();

});
</script>

</body>
</html>
