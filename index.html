<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Text to PNG Generator</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #f5f5f5;
        text-align: center;
        padding: 30px;
    }

    .container {
        background: white;
        padding: 20px;
        border-radius: 10px;
        max-width: 500px;
        margin: auto;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    input, button {
        margin: 10px;
        padding: 10px;
        font-size: 16px;
    }

    label {
        display: block;
        margin-top: 10px;
    }

    /* ✅ Custom Font */
    @font-face {
        font-family: 'MyCustomFont';
        src: url('font/myfont.ttf') format('truetype');
    }

    #preview {
        margin-top: 20px;
        padding: 20px;
        border: 2px dashed #ccc;
        min-height: 120px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'MyCustomFont', sans-serif;
    }
</style>
</head>
<body>

<div class="container">
    <h2>Text to PNG Generator</h2>

    <!-- Text -->
    <input type="text" id="textInput" placeholder="Enter your text">

    <!-- Font Size -->
    <label>Font Size: <span id="sizeValue">40</span>px</label>
    <input type="range" id="fontSize" min="10" max="150" value="40">

    <!-- Text Color -->
    <label>Text Color</label>
    <input type="color" id="textColor" value="#000000">

    <!-- Background -->
    <label>Background Color</label>
    <input type="color" id="bgColor" value="#ffffff">

    <!-- Transparent Toggle -->
    <label>
        <input type="checkbox" id="transparentBg"> Transparent Background
    </label>

    <!-- Preview -->
    <div id="preview">Preview Text</div>

    <!-- Download -->
    <button onclick="downloadPNG()">Download PNG</button>
</div>

<script>
const textInput = document.getElementById("textInput");
const preview = document.getElementById("preview");
const textColor = document.getElementById("textColor");
const bgColor = document.getElementById("bgColor");
const transparentBg = document.getElementById("transparentBg");
const fontSize = document.getElementById("fontSize");
const sizeValue = document.getElementById("sizeValue");

let customFontName = "MyCustomFont";

// Update preview
function updatePreview() {
    preview.textContent = textInput.value || "Preview Text";
    preview.style.color = textColor.value;
    preview.style.fontSize = fontSize.value + "px";
    preview.style.fontFamily = customFontName;

    sizeValue.textContent = fontSize.value;

    if (transparentBg.checked) {
        preview.style.background = "transparent";
    } else {
        preview.style.background = bgColor.value;
    }
}

textInput.addEventListener("input", updatePreview);
textColor.addEventListener("input", updatePreview);
bgColor.addEventListener("input", updatePreview);
transparentBg.addEventListener("change", updatePreview);
fontSize.addEventListener("input", updatePreview);

// High-quality PNG download
async function downloadPNG() {
    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");

    const text = textInput.value || "Preview Text";
    const fontSizeValue = parseInt(fontSize.value);
    const dpr = 3; // High quality

    // ✅ Ensure font is loaded
    await document.fonts.load(fontSizeValue + "px " + customFontName);

    ctx.font = fontSizeValue + "px " + customFontName;
    const textWidth = ctx.measureText(text).width;

    canvas.width = (textWidth + 40) * dpr;
    canvas.height = (fontSizeValue + 40) * dpr;

    ctx.scale(dpr, dpr);

    // Background
    if (!transparentBg.checked) {
        ctx.fillStyle = bgColor.value;
        ctx.fillRect(0, 0, textWidth + 40, fontSizeValue + 40);
    }

    // Text
    ctx.font = fontSizeValue + "px " + customFontName;
    ctx.fillStyle = textColor.value;
    ctx.textBaseline = "top";

    ctx.fillText(text, 20, 20);

    // Download
    const link = document.createElement("a");
    link.download = "text-hd.png";
    link.href = canvas.toDataURL("image/png");
    link.click();
}

// Init
updatePreview();
</script>

</body>
</html>
