<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Text to PNG Generator</title>

<style>
@font-face {
    font-family: 'MyCustomFont';
    src: url('fonts/myfont.ttf') format('truetype');
}

body {
    font-family: Arial, sans-serif;
    background: #f5f5f5;
    text-align: center;
    padding: 30px;
}

.container {
    background: white;
    padding: 20px;
    border-radius: 10px;
    max-width: 500px;
    margin: auto;
}

#preview {
    margin-top: 20px;
    padding: 20px;
    border: 2px dashed #ccc;
    font-family: 'MyCustomFont', sans-serif;
}
</style>
</head>

<body>

<div class="container">
    <h2>Text to PNG Generator</h2>

    <input type="text" id="textInput" placeholder="Enter text">

    <div id="preview">Preview Text</div>
</div>

<script>
const input = document.getElementById("textInput");
const preview = document.getElementById("preview");

input.addEventListener("input", () => {
    preview.textContent = input.value || "Preview Text";
});
</script>

</body>
</html>
